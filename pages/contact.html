<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | NTC Exam Prep</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NTC Prep">
  <link rel="apple-touch-icon" href="/icons/icon-192.png"></head>
<body>
  
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="navbar-brand">
        <div class="brand-icon">N</div>
        <span>NTC Prep</span>
      </a>
      
      <div class="navbar-toggle" id="navbarToggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
      
      <div class="navbar-nav" id="navbarNav">
        <a href="../index.html#features" class="nav-link">Features</a>
        <a href="../index.html#subjects" class="nav-link">Subjects</a>
        <a href="contact.html" class="nav-link active">Contact</a>
      </div>
      
      <div class="navbar-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode"></button>
        <a href="login.html" class="btn btn-ghost">Log In</a>
        <a href="register.html" class="btn btn-primary">Sign Up Free</a>
      </div>
    </div>
  </nav>

  <div class="container" style="padding-top: var(--space-3xl); padding-bottom: var(--space-3xl);">
    <div class="section-header text-center reveal">
      <h1 class="section-title">Get in Touch</h1>
      <p class="section-subtitle">Have questions about our NTC Exam Prep platform? We're here to help.</p>
    </div>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: var(--space-2xl); max-width: 1000px; margin: 0 auto;">
      
      <!-- Contact Info -->
      <div class="reveal-left">
        <div style="background: var(--surface); padding: var(--space-xl); border-radius: var(--radius-xl); height: 100%; border: 1px solid var(--border);">
          <h3 style="margin-bottom: var(--space-lg);">Contact Information</h3>
          
          <div style="display: flex; gap: var(--space-md); margin-bottom: var(--space-lg);">
            <div style="width: 48px; height: 48px; border-radius: 50%; background: var(--primary-ghost); display: flex; align-items: center; justify-content: center; color: var(--primary); flex-shrink: 0;">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <div>
              <h4 style="font-size: var(--text-base); margin-bottom: 4px;">Email Us</h4>
              <p style="color: var(--text-light);">support@ntcprep.com.gh</p>
            </div>
          </div>
          
          <div style="display: flex; gap: var(--space-md); margin-bottom: var(--space-lg);">
            <div style="width: 48px; height: 48px; border-radius: 50%; background: var(--primary-ghost); display: flex; align-items: center; justify-content: center; color: var(--primary); flex-shrink: 0;">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </div>
            <div>
              <h4 style="font-size: var(--text-base); margin-bottom: 4px;">Call Us</h4>
              <p style="color: var(--text-light);">+233 (0) 54 123 4567</p>
            </div>
          </div>
          
          <div style="display: flex; gap: var(--space-md);">
            <div style="width: 48px; height: 48px; border-radius: 50%; background: var(--primary-ghost); display: flex; align-items: center; justify-content: center; color: var(--primary); flex-shrink: 0;">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div>
              <h4 style="font-size: var(--text-base); margin-bottom: 4px;">Office Address</h4>
              <p style="color: var(--text-light);">East Legon, Accra<br>Ghana</p>
            </div>
          </div>
          
          <div style="margin-top: var(--space-2xl);">
            <h4 style="font-size: var(--text-base); margin-bottom: var(--space-md);">Follow Us</h4>
            <div style="display: flex; gap: var(--space-sm);">
              <a href="#" style="width: 40px; height: 40px; border-radius: 50%; background: var(--surface-hover); display: flex; align-items: center; justify-content: center; color: var(--text);">f</a>
              <a href="#" style="width: 40px; height: 40px; border-radius: 50%; background: var(--surface-hover); display: flex; align-items: center; justify-content: center; color: var(--text);">t</a>
              <a href="#" style="width: 40px; height: 40px; border-radius: 50%; background: var(--surface-hover); display: flex; align-items: center; justify-content: center; color: var(--text);">in</a>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Contact Form -->
      <div class="reveal-right">
        <form style="background: var(--surface); padding: var(--space-xl); border-radius: var(--radius-xl); border: 1px solid var(--border);" onsubmit="event.preventDefault(); window.showToast('Message sent successfully! We will get back to you soon.', 'success'); this.reset();">
          <div style="margin-bottom: var(--space-md);">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" placeholder="Your name" required>
          </div>
          
          <div style="margin-bottom: var(--space-md);">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" placeholder="Your email" required>
          </div>
          
          <div style="margin-bottom: var(--space-md);">
            <label class="form-label">Subject</label>
            <select class="form-input form-select" required>
              <option value="" disabled selected>Select a subject</option>
              <option value="support">Technical Support</option>
              <option value="billing">Billing Inquiry</option>
              <option value="partnership">Partnership</option>
              <option value="other">Other</option>
            </select>
          </div>
          
          <div style="margin-bottom: var(--space-lg);">
            <label class="form-label">Message</label>
            <textarea class="form-input" rows="5" placeholder="How can we help you?" required></textarea>
          </div>
          
          <button type="submit" class="btn btn-primary btn-block btn-lg">Send Message</button>
        </form>
      </div>
      
    </div>
  </div>

  <script src="../js/app.js?v=4"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[NTC] SW registered:', reg.scope))
          .catch(err => console.warn('[NTC] SW registration failed:', err));
      });
    }
  </script></body>
</html>
