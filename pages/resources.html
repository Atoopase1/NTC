<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Resources | NTC Exam Prep</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/responsive.css">
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NTC Prep">
  <link rel="apple-touch-icon" href="/icons/icon-192.png"></head>
<body>
  
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container" style="max-width: 100%;">
      <div style="display: flex; align-items: center; gap: var(--space-md);">
        <button class="sidebar-toggle-btn" id="sidebarToggle" aria-label="Toggle Sidebar">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        
        <a href="dashboard.html" class="navbar-brand">
          <div class="brand-icon">N</div>
          <span>NTC Prep</span>
        </a>
      </div>
      
      <div class="navbar-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode"></button>
        <div class="user-dropdown">
          <div class="user-dropdown-toggle">
            <div class="avatar avatar-sm user-avatar-initials">U</div>
            <span class="user-name">User Name</span>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="dashboard-layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-nav">
        <div class="sidebar-section">
          <div class="sidebar-section-title">Menu</div>
          <a href="dashboard.html" class="sidebar-link">
            <span class="sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg></span>
            Dashboard
          </a>
          <a href="exam.html" class="sidebar-link">
            <span class="sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg></span>
            Mock Exams
          </a>
          <a href="resources.html" class="sidebar-link active">
            <span class="sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg></span>
            Study Resources
          </a>
          <a href="leaderboard.html" class="sidebar-link">
            <span class="sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg></span>
            Leaderboard
          </a>
        </div>
      </div>
    </aside>
    
    <!-- Main Content -->
    <main class="dashboard-main">
      <div class="page-header" style="border-radius: var(--radius-xl); padding: var(--space-2xl); margin-bottom: var(--space-xl);">
        <h1>Study Resources & Notes</h1>
        <p>Download comprehensive PDF guides, past question analyses, and subject summaries.</p>
      </div>

      <div class="tabs" style="margin-bottom: var(--space-xl);" id="resourceTabs">
        <button class="tab-btn active" data-tab="tab-all">All Materials</button>
      </div>

      <div class="tab-content active" id="tab-all">
        <div class="resources-grid" id="allResourcesGrid">
          <div class="empty-state">
            <p>Loading study materials...</p>
          </div>
        </div>
      </div>
      
      <div id="dynamicTabContents">
        <!-- Dynamic tab contents will be injected here -->
      </div>

    </main>
  </div>

  <script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/auth.js"></script>
  
  <style>
    .desc-text {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
      font-size: var(--text-sm);
      color: var(--text-light);
      line-height: 1.5;
    }
    .desc-text.expanded {
      -webkit-line-clamp: unset;
    }
    .read-more-btn {
      background: none;
      border: none;
      color: var(--primary);
      font-weight: 600;
      font-size: var(--text-sm);
      cursor: pointer;
      padding: 0;
      margin-bottom: var(--space-sm);
    }
    .read-more-btn:hover {
      text-decoration: underline;
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const resourceTabs = document.getElementById('resourceTabs');
      const dynamicTabContents = document.getElementById('dynamicTabContents');
      const allResourcesGrid = document.getElementById('allResourcesGrid');
      
      // Expand/Collapse description
      window.toggleDescription = (btn) => {
        const p = btn.previousElementSibling;
        p.classList.toggle('expanded');
        if (p.classList.contains('expanded')) {
          btn.textContent = 'Show less';
        } else {
          btn.textContent = 'Read more';
        }
      };

      if (resourceTabs && dynamicTabContents && window.supaDB && window.supaDB.getSubjects) {
        try {
          // Fetch Subjects and Lessons in parallel
          const [subRes, lesRes] = await Promise.all([
            window.supaDB.getSubjects(),
            window.supaDB.getLessons ? window.supaDB.getLessons() : {data:[]}
          ]);
          
          const subjects = subRes.data || subRes || [];
          const lessons = lesRes.data || [];

          // Helper to get SVG icon based on media_type
          const getIcon = (type) => {
            if (type === 'video') return `<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
            if (type === 'pdf') return `<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
            if (type === 'image') return `<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
            if (type === 'audio') return `<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`;
            return `<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>`;
          };

          // Helper to generate a resource card HTML
          const createCardHtml = (lesson) => {
            const desc = lesson.description || lesson.content || '';
            const isLong = desc.length > 120;
            const dateStr = new Date(lesson.created_at).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
            
            let actionBtn = '';
            let mediaEmbed = '';
            
            if (lesson.media_url) {
              const url = lesson.media_url;
              const type = lesson.media_type;
              
              if (type === 'video') {
                mediaEmbed = `<video controls style="max-width:100%; border-radius:8px; margin-top:var(--space-md);"><source src="${url}">Your browser does not support video.</video>`;
              } else if (type === 'image') {
                mediaEmbed = `<img src="${url}" style="max-width:100%; border-radius:8px; margin-top:var(--space-md);" alt="Study Resource" loading="lazy">`;
              } else if (type === 'audio') {
                mediaEmbed = `<audio controls style="width:100%; margin-top:var(--space-md);"><source src="${url}">Your browser does not support audio.</audio>`;
              } else if (type === 'pdf') {
                mediaEmbed = `<iframe src="${url}" style="width:100%; height:300px; border:none; border-radius:8px; margin-top:var(--space-md);" title="PDF Document"></iframe>`;
                actionBtn = `<a href="${url}" target="_blank" class="btn btn-primary btn-block" style="margin-top:var(--space-md);">Open PDF in New Tab</a>`;
              } else {
                actionBtn = `<a href="${url}" target="_blank" class="btn btn-primary btn-block" style="margin-top:var(--space-md);">Download / View File</a>`;
              }
            } else if (lesson.content) {
              // If it's just text, we can show it fully or let them read the description
              actionBtn = `<button class="btn btn-outline btn-block" style="margin-top:var(--space-md);" onclick="alert('Text notes\\n\\n' + \`${lesson.content.replace(/`/g, "'")}\`)">Read Full Notes</button>`;
            }

            return `
              <div class="resource-card" style="display:flex; flex-direction:column; overflow:hidden;">
                <div style="display:flex; align-items:center; gap:var(--space-sm); margin-bottom:var(--space-md);">
                  <div class="resource-icon" style="margin-bottom:0;">${getIcon(lesson.media_type)}</div>
                  <div>
                    <h3 class="resource-title" style="margin-bottom:4px; word-wrap:break-word;">${lesson.title || lesson.subtopic || 'Lesson'}</h3>
                    <div style="font-size:var(--text-xs); color:var(--primary); font-weight:600;">${lesson.subject || ''}</div>
                  </div>
                </div>
                
                <div style="flex:1;">
                  <p class="desc-text" style="word-wrap:break-word; white-space:pre-wrap;">${desc}</p>
                  ${isLong ? `<button class="read-more-btn" onclick="toggleDescription(this)">Read more</button>` : ''}
                </div>

                ${mediaEmbed}

                <div class="resource-meta" style="margin-top: var(--space-md);">
                  <span style="text-transform: capitalize;">${lesson.media_type || 'Document'}</span>
                  <span>Added: ${dateStr}</span>
                </div>
                ${actionBtn}
              </div>
            `;
          };

          // Render "All Materials"
          if (lessons.length === 0) {
            allResourcesGrid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;"><p>No study materials have been published yet.</p></div>`;
          } else {
            allResourcesGrid.innerHTML = lessons.map(createCardHtml).join('');
          }

          if (subjects && subjects.length > 0) {
            let tabsHtml = '';
            let contentsHtml = '';
            
            subjects.forEach((sub, idx) => {
              const tabId = `tab-sub-${sub.id}`;
              const subLessons = lessons.filter(l => l.subject === sub.name);

              tabsHtml += `<button class="tab-btn" data-tab="${tabId}">${sub.name}</button>`;
              
              let subContentHtml = `<div class="empty-state" style="grid-column: 1/-1;">
                <div class="empty-state-icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div>
                <h3>${sub.name} Resources</h3>
                <p>No materials published for this subject yet.</p>
              </div>`;

              if (subLessons.length > 0) {
                subContentHtml = subLessons.map(createCardHtml).join('');
              }

              contentsHtml += `
                <div class="tab-content" id="${tabId}">
                  <div class="resources-grid">
                    ${subContentHtml}
                  </div>
                </div>
              `;
            });
            
            resourceTabs.innerHTML += tabsHtml;
            dynamicTabContents.innerHTML = contentsHtml;
            
            // Re-attach tab listeners
            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => {
              btn.addEventListener('click', () => {
                const tabId = btn.getAttribute('data-tab');
                
                // Remove active class from all buttons and content
                btn.parentElement.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                // Add active class to current button and target content
                btn.classList.add('active');
                const target = document.getElementById(tabId);
                if (target) target.classList.add('active');
              });
            });
          }
        } catch (e) {
          console.error("Error loading resources:", e);
          allResourcesGrid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;color:var(--danger);"><p>Failed to load study materials.</p></div>`;
        }
      }
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[NTC] SW registered:', reg.scope))
          .catch(err => console.warn('[NTC] SW registration failed:', err));
      });
    }
  </script></body>
</html>
